services:
  - type: web
    name: student-alo-mapping-system
    runtime: node
    plan: free
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_IN_MEMORY_DB
        value: "false"
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: DEFAULT_ADMIN_USERNAME
        value: admin
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
